<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备保修查询 - foxsbai</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            border-color: #667eea;
        }
        .search-box button {
            padding: 14px 28px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .search-box button:hover {
            background: #5a6fd6;
        }
        .result {
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-card {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 24px;
        }
        .result-card h3 {
            color: #333;
            margin-bottom: 16px;
            font-size: 18px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e8e8ff;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #888;
            font-size: 14px;
        }
        .info-value {
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .warranty-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 16px;
        }
        .warranty-valid {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .warranty-expiring {
            background: #fff3e0;
            color: #e65100;
        }
        .warranty-expired {
            background: #fce4ec;
            color: #c62828;
        }
        .error-msg {
            text-align: center;
            color: #c62828;
            padding: 20px;
            display: none;
        }
        .loading {
            text-align: center;
            color: #888;
            padding: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 设备保修查询</h1>
        <p class="subtitle">输入设备序列号，查询保修状态</p>

        <div class="search-box">
            <input type="text" id="snInput" placeholder="请输入设备序列号" autofocus>
            <button onclick="lookup()">查询</button>
        </div>

        <div class="loading" id="loading">查询中...</div>
        <div class="error-msg" id="error"></div>

        <div class="result" id="result">
            <div class="result-card">
                <h3>📋 设备信息</h3>
                <div class="info-row">
                    <span class="info-label">序列号</span>
                    <span class="info-value" id="r-sn">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">型号</span>
                    <span class="info-value" id="r-model">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">品牌</span>
                    <span class="info-value" id="r-brand">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">分类</span>
                    <span class="info-value" id="r-category">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">出库日期</span>
                    <span class="info-value" id="r-outdate">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">保修截止</span>
                    <span class="info-value" id="r-warranty-end">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">保修月数</span>
                    <span class="info-value" id="r-warranty-months">-</span>
                </div>
                <div id="warranty-badge"></div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 部署后修改为你的服务器地址
        const API_BASE = 'http://YOUR_SERVER_IP:8055';

        async function lookup() {
            const sn = document.getElementById('snInput').value.trim();
            if (!sn) return;

            document.getElementById('result').classList.remove('show');
            document.getElementById('error').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const resp = await fetch(`${API_BASE}/api/public/warranty/?sn=${encodeURIComponent(sn)}`);
                const data = await resp.json();
                document.getElementById('loading').style.display = 'none';

                if (data.error) {
                    document.getElementById('error').textContent = data.error;
                    document.getElementById('error').style.display = 'block';
                    return;
                }

                document.getElementById('r-sn').textContent = data.serial_number;
                document.getElementById('r-model').textContent = data.model_name;
                document.getElementById('r-brand').textContent = data.brand || '-';
                document.getElementById('r-category').textContent = data.category || '-';
                document.getElementById('r-outdate').textContent = data.outbound_date || '-';
                document.getElementById('r-warranty-end').textContent = data.warranty_end || '-';
                document.getElementById('r-warranty-months').textContent = data.warranty_months + ' 个月';

                const badge = document.getElementById('warranty-badge');
                if (data.warranty_valid) {
                    if (data.days_left <= 30) {
                        badge.innerHTML = `<span class="warranty-badge warranty-expiring">⚠️ 保修即将到期（剩余 ${data.days_left} 天）</span>`;
                    } else {
                        badge.innerHTML = `<span class="warranty-badge warranty-valid">✅ 保修有效（剩余 ${data.days_left} 天）</span>`;
                    }
                } else if (data.days_left !== null) {
                    badge.innerHTML = `<span class="warranty-badge warranty-expired">❌ 保修已过期</span>`;
                } else {
                    badge.innerHTML = '';
                }

                document.getElementById('result').classList.add('show');
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = '网络错误，请稍后重试';
                document.getElementById('error').style.display = 'block';
            }
        }

        document.getElementById('snInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') lookup();
        });
    </script>
</body>
</html>
